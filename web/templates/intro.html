{% extends "base.html" %}

{# Hide the global dashboard/scan/reports header on the intro page as well #}
{% block header %}{% endblock %}

{% block content %}
  <div class="intro-screen">
    <div class="intro-panel">
      <h2 class="intro-title">NeuVulneraScan</h2>
      <p class="intro-line intro-line-main">Please wait for the application, redirecting you to login&hellip;</p>

      <div class="intro-loader">
        <div class="intro-orb"></div>
        <div class="intro-orb-shadow"></div>
      </div>

      <p class="intro-hint">Loading scanner modules&hellip;</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const targetUrl = "{{ url_for('auth.login') }}";

      // Let the animation play for 15 seconds before redirecting to login
      setTimeout(function () {
        window.location.href = targetUrl;
      }, 15000);
    });
  </script>
{% endblock %}
