{% extends "base.html" %}

{% block header %}{% endblock %}

{% block content %}
  <div class="intro-screen logout-screen admin-logout-screen">
    <div class="intro-panel">
      <h2 class="intro-title">Goodbye, Admin</h2>
      <p class="intro-line intro-line-main">Securing all sessions and closing the control panel&hellip;</p>

      <div class="intro-loader admin-logout-loader">
        <div class="intro-orb admin-orb"></div>
        <div class="intro-orb-shadow"></div>
      </div>

      <p class="intro-hint">Audit trails saved. Redirecting you back to the admin sign-in&hellip;</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const targetUrl = "{{ url_for('auth.admin_login') }}";

      setTimeout(function () {
        window.location.href = targetUrl;
      }, 4000);
    });
  </script>
{% endblock %}
